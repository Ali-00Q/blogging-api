$kind: http-request
name: Create Post Validation
url: http://localhost:5000/posts
method: POST
body:
  type: json
  content: "{\r

    \    \"title\": \"\",\r

    \    \"content\": \"\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: "const response = pm.response.json();\r

      pm.environment.set(\"postId\", response._id);"
    language: text/javascript
order: 5000
